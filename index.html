<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sintetizador Arcano | Forja de Magias</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-bg: #1f2833;
            --accent-glow: #66fcf1;
            --text-main: #c5c6c7;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            background-color: var(--panel-bg);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8), 0 0 15px var(--accent-glow) inset;
            width: 90%;
            max-width: 500px;
            text-align: center;
            position: relative;
        }

        h1 {
            color: var(--accent-glow);
            text-transform: uppercase;
            font-size: 24px;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .input-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }

        .input-group span {
            font-size: 24px;
            color: var(--accent-glow);
            font-weight: bold;
        }

        input {
            width: 45%;
            padding: 10px;
            background-color: #000;
            border: 1px solid var(--accent-glow);
            color: #fff;
            text-align: center;
            font-size: 16px;
            border-radius: 5px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: transparent;
            color: var(--accent-glow);
            border: 2px solid var(--accent-glow);
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 10px;
        }

        button:active {
            background-color: var(--accent-glow);
            color: var(--bg-color);
        }

        .forge-animation {
            display: none;
            height: 100px;
            position: relative;
            margin: 20px 0;
        }

        .orb {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            filter: blur(3px);
            opacity: 0;
        }

        .orb.left { background-color: #ff4c4c; box-shadow: 0 0 20px #ff4c4c; left: 10%; }
        .orb.right { background-color: #4da6ff; box-shadow: 0 0 20px #4da6ff; right: 10%; }
        .fusion-core {
            width: 10px;
            height: 10px;
            background-color: #fff;
            border-radius: 50%;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 40px 15px var(--accent-glow);
            opacity: 0;
        }

        .animating .orb.left { animation: moveRight 1.2s ease-in forwards; }
        .animating .orb.right { animation: moveLeft 1.2s ease-in forwards; }
        .animating .fusion-core { animation: explode 1.5s 1.2s forwards; }

        @keyframes moveRight { 0% { opacity: 0; left: 10%; } 100% { left: 45%; opacity: 1; } }
        @keyframes moveLeft { 0% { opacity: 0; right: 10%; } 100% { right: 45%; opacity: 1; } }
        @keyframes explode {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(8); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0); }
        }

        #result-box {
            display: none;
            margin-top: 20px;
            padding: 15px;
            border-left: 4px solid var(--accent-glow);
            background: rgba(102, 252, 241, 0.1);
            text-align: left;
        }

        #spell-name { font-size: 22px; color: #fff; margin-bottom: 10px; text-transform: capitalize; }
        #spell-desc { font-size: 15px; line-height: 1.4; color: #ddd; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sintetizador Arcano</h1>
        
        <div id="input-section">
            <div class="input-group">
                <input type="text" id="elem1" placeholder="Ex: Fogo">
                <span>+</span>
                <input type="text" id="elem2" placeholder="Ex: Gelo">
            </div>
            <button id="btn-criar" onclick="criarMagia()">Sintetizar Magia</button>
        </div>

        <div class="forge-animation" id="animation-area">
            <div class="orb left"></div>
            <div class="orb right"></div>
            <div class="fusion-core"></div>
        </div>

        <div id="result-box">
            <div id="spell-name"></div>
            <div id="spell-desc"></div>
        </div>
    </div>

    <script>
        // CHAVE INSERIDA CONFORME SOLICITADO
        const API_KEY = 'AQ.Ab8RN6KOOgE716qyWUhoXSG5QHOIRzmPZEMjR0UvY6jHQ6KJHQ'; 

        async function criarMagia() {
            const el1 = document.getElementById('elem1').value.trim();
            const el2 = document.getElementById('elem2').value.trim();
            const btn = document.getElementById('btn-criar');
            const animArea = document.getElementById('animation-area');
            const resultBox = document.getElementById('result-box');

            if (!el1 || !el2) {
                alert("Preencha os dois elementos!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Sintetizando...";
            resultBox.style.display = 'none';
            animArea.style.display = 'block';
            
            animArea.classList.remove('animating');
            void animArea.offsetWidth; 
            animArea.classList.add('animating');

            const promptText = `
                Crie uma magia épica juntando ${el1} e ${el2}.
                Retorne APENAS um JSON válido.
                Formato exato: {"nome": "nome da magia", "descricao": "descrição visual da magia em 2 frases"}
            `;

            try {
                // MODELO ATUALIZADO PARA 2.0 FLASH
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!response.ok) {
                    throw new Error("Erro na conexão com a API. Verifique sua chave.");
                }

                const data = await response.json();
                
                let aiResponseText = data.candidates[0].content.parts[0].text;
                aiResponseText = aiResponseText.replace(/```json/g, '').replace(/```/g, '').trim();
                
                const magiaGerada = JSON.parse(aiResponseText);

                setTimeout(() => {
                    animArea.style.display = 'none';
                    animArea.classList.remove('animating');
                    
                    document.getElementById('spell-name').innerText = magiaGerada.nome;
                    document.getElementById('spell-desc').innerText = magiaGerada.descricao;
                    resultBox.style.display = 'block';

                    btn.disabled = false;
                    btn.innerText = "Nova Síntese";
                }, 2700);

            } catch (error) {
                alert("DETALHE DO ERRO: " + error.message);
                btn.disabled = false;
                btn.innerText = "Tentar Novamente";
                animArea.style.display = 'none';
            }
        }
    </script>
</body>
</html>
